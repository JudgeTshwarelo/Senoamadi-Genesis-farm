<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CONTACT | SPI</title>
    <link rel="icon" type="image/png" href="SPI LOGO.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", Arial, sans-serif;
      }
      body {
        background: linear-gradient(135deg, #0a0a29, #0d1a52);
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* HEADER */
      header {
        width: 100%;
        background: darkblue;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        text-align: center;
      }
      header img {
        height: 80px;
        border-radius: 10px;
      }
      header h1 {
        font-size: 1.6rem;
        letter-spacing: 1px;
      }

      /* NAVIGATION */
      nav {
        width: 100%;
        background: #0033cc;
        position: sticky;
        top: 0;
        z-index: 10000;
      }
      .nav-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0.8rem 1.2rem;
        position: relative;
      }
      .logo {
        color: #fff;
        text-decoration: none;
        font-weight: bold;
        letter-spacing: 1px;
      }
      .nav-links {
        display: flex;
        gap: 15px;
        list-style: none;
      }
      .nav-links a {
        color: #fff;
        text-decoration: none;
        padding: 10px 15px;
        border-radius: 6px;
        font-weight: 600;
        transition: 0.3s;
      }
      .nav-links a:hover {
        background: #001f66;
        box-shadow: 0 0 10px #4d88ff;
      }

      /* HAMBURGER */
      .menu-toggle {
        display: none;
        flex-direction: column;
        justify-content: space-between;
        width: 28px;
        height: 20px;
        cursor: pointer;
        background: none;
        border: none;
        z-index: 20000;
      }
      .menu-toggle span {
        display: block;
        height: 3px;
        background: #fff;
        border-radius: 2px;
        transition: 0.3s;
      }
      .menu-toggle.active span:nth-child(1) {
        transform: rotate(45deg) translateY(8px);
      }
      .menu-toggle.active span:nth-child(2) {
        opacity: 0;
      }
      .menu-toggle.active span:nth-child(3) {
        transform: rotate(-45deg) translateY(-8px);
      }

      /* RESPONSIVE */
      @media (max-width: 850px) {
        .menu-toggle {
          display: flex;
        }
        .nav-links {
          position: absolute;
          top: 1px;
          right: 0;
          width: 100%;
          flex-direction: column;
          align-items: center;
          background: #0033cc;
          transform: translateY(-100%);
          opacity: 0;
          transition: 0.4s;
          z-index: 10000;
          padding: 20px 0;
        }
        .nav-links.active {
          transform: translateY(0);
          opacity: 1;
        }
        .nav-links a {
          width: 100%;
          text-align: center;
          padding: 12px 0;
        }
      }

      /* ABOUT SECTION */
      .text {
        font-size: 2rem;
        margin: 40px 0 20px 0;
        color: #00aaff;
        text-align: center;
      }
      .about-description {
        max-width: 800px;
        text-align: center;
        font-size: 1.1rem;
        margin-bottom: 40px;
      }

      /* FOOTER */
      footer {
        background: darkblue;
        color: white;
        text-align: center;
        padding: 1.5rem;
        width: 100%;
        margin-top: auto;
      }
      .social-icon {
        margin-bottom: 10px;
      }
      .social-icon a {
        color: white;
        border: 2px solid white;
        border-radius: 50%;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        margin: 0 6px;
        width: 40px;
        height: 40px;
        font-size: 18px;
        transition: 0.3s;
      }
      .social-icon a:hover {
        background: #fff;
        color: darkblue;
        transform: scale(1.1);
      }

      .main-container {
        display: flex;
        justify-content: center;
        padding: 50px 20px;
        margin-top: 50px;
      }

      .content {
        background-color: rgba(0, 0, 0, 0.6);
        padding: 30px;
        border-radius: 15px;
        color: white;
        max-width: 800px;
        text-align: center;
      }

      .social-links {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 16px 32px;
        border-radius: 10px;
        color: white;
        text-decoration: none;
        font-weight: 600;
        transition: transform 0.5s, box-shadow 0.5s;
        transform-style: preserve-3d;
      }

      .btn::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.25);
        transform: translateZ(-20px);
        border-radius: 10px;
        z-index: -1;
      }

      .btn:hover::after {
        left: 130%;
      }
      .btn:hover {
        transform: rotateX(8deg) rotateY(-5deg) translateY(-6px) scale(1.08);
      }

      .whatsapp {
        background: #25d366;
      }
      .email {
        background: #ea4335;
      }
      .phone {
        background: #333;
      }
      .address {
        background: #0077b5;
      }
    </style>
  </head>

  <body>
    <!-- HEADER -->
    <header>

    <!-- SCRIPT -->
    <script>
      const toggle = document.getElementById("menu-toggle");
      const navLinks = document.getElementById("nav-links");

      toggle.addEventListener("click", () => {
        const expanded = toggle.getAttribute("aria-expanded") === "true";
        toggle.setAttribute("aria-expanded", !expanded);
        toggle.classList.toggle("active");
        navLinks.classList.toggle("active");
      });

      // Close menu when link is clicked (mobile)
      navLinks.querySelectorAll("a").forEach((link) => {
        link.addEventListener("click", () => {
          if (navLinks.classList.contains("active")) {
            navLinks.classList.remove("active");
            toggle.classList.remove("active");
            toggle.setAttribute("aria-expanded", false);
          }
        });
      });
    </script>
  </body>
